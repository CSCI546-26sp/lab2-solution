syntax = "proto3";

package raftpb;

// Log entry structure
message Entry {
  uint64 term = 1;           // term when entry was received by leader
  uint64 index = 2;          // position in the log
  bytes command = 3;        // command for state machine
}
// AppendEntries RPC - invoked by leader to replicate log entries and as heartbeat
message AppendEntriesRequest {
  uint64 term = 1;           // leader's term
  int64 leader_id = 2;      // so follower can redirect clients
  uint64 prev_log_index = 3; // index of log entry immediately preceding new ones
  uint64 prev_log_term = 4;  // term of prevLogIndex entry
  repeated Entry entries = 5; // log entries to store (empty for heartbeat)
  uint64 leader_commit = 6;  // leader's commitIndex
}

message AppendEntriesResponse {
  uint64 term = 1;           // currentTerm, for leader to update itself
  bool success = 2;         // true if follower contained entry matching
                            // prevLogIndex and prevLogTerm
}

// RequestVote RPC - invoked by candidates to gather votes (§5.2)
message RequestVoteRequest {
  uint64 term = 1;           // candidate's term
  uint64 candidate_id = 2;   // candidate requesting vote
  uint64 last_log_index = 3; // index of candidate's last log entry (§5.4)
  uint64 last_log_term = 4;  // term of candidate's last log entry (§5.4)
}

message RequestVoteResponse {
  uint64 term = 1;           // currentTerm, for candidate to update itself
  bool vote_granted = 2;    // true means candidate received vote
}

service RaftService {
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
}